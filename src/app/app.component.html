<div class="app-layout" [class.dark-mode]="isDarkMode">

  <aside class="sidebar" [class.open]="isSidebarOpen">
    <button class="new-chat-btn" (click)="createNewChat()">+ New Chat</button>

    <div class="chat-list">
      <div class="chat-item" 
           *ngFor="let session of sessions" 
           [class.active]="session.id === currentSessionId"
           (click)="selectChat(session.id)">
           
        <span class="chat-title">{{ session.title }}</span>
        
        <button class="delete-btn" (click)="openDeleteModal($event, session.id)" title="Delete Chat">✕</button>
      </div>
    </div>
  </aside>

  <main class="chat-main">

    <div class="chat-container">
      <header>
        <div class="header-info">

          <button class="menu-btn" (click)="isSidebarOpen = !isSidebarOpen">☰</button>

          <div class="avatar-circle">🤖</div>
          <div class="title">
            <h2>AI Companion</h2>
            <span class="status">Online</span>
          </div>
        </div>
        <button class="icon-btn theme-toggle" (click)="toggleTheme()" title="Toggle Theme">
          {{ isDarkMode ? '☀️' : '🌙' }}
        </button>
      </header>

      <div class="chat-box" #scrollMe>
        <div *ngFor="let msg of messages" class="message-row"
          [ngClass]="{'user-row': msg.role === 'user', 'bot-row': msg.role === 'bot'}">

          <div class="message-bubble" [ngClass]="msg.role">
            {{ msg.text }}
          </div>
        </div>

        <div class="message-row bot-row" *ngIf="isLoading">
          <div class="message-bubble bot typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <input type="text" [(ngModel)]="userInput" (keyup.enter)="sendMessage()" placeholder="Type a message Sahoo..."
            [disabled]="isRecording" />
          <button class="icon-btn send-btn" (click)="sendMessage()" [disabled]="!userInput.trim() || isRecording">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <button class="fab-voice" *ngIf="!isVoiceMode" (click)="enterVoiceMode()">
      <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
      </svg>
    </button>

    <div class="voice-modal" *ngIf="isVoiceMode">
      <button class="close-btn" (click)="closeVoiceMode()">✕</button>

      <div class="orb-container" (click)="startListening()">
        <div class="orb" [class.listening]="isRecording" [class.thinking]="isLoading" [class.speaking]="botIsSpeaking">
        </div>
      </div>

      <div class="voice-status">
        <p [class.speaking-text]="botIsSpeaking">{{ currentVoiceText }}</p>
      </div>
    </div>

  </main>

  <div class="modal-overlay" *ngIf="isDeleteModalOpen" (click)="cancelDelete()">
    
    <div class="modal-content" (click)="$event.stopPropagation()">
      <h3>Delete Conversation?</h3>
      <p>Are you sure you want to delete this chat? This action cannot be undone.</p>
      
      <div class="modal-actions">
        <button class="cancel-btn" (click)="cancelDelete()">Cancel</button>
        <button class="confirm-btn" (click)="confirmDelete()">Yes, Delete</button>
      </div>
    </div>
    
  </div>
</div>
